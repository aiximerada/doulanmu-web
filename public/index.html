<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朵藍姆光工作室 | 模組化升級版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=PingFang+TC:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* CSS 樣式完全沒變，保持星空美感 */
        body { margin: 0; font-family: 'PingFang TC', sans-serif; background: linear-gradient(135deg, #0f051a 0%, #2a1147 50%, #1a0b2e 100%); color: #fce4ec; min-height: 100vh; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Noto Serif TC', serif; letter-spacing: 2px; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; position: absolute; top: 0; width: 90%; z-index: 1000; }
        .logo-text { font-family: 'Noto Serif TC', serif; font-size: 1.5em; color: #d4af37; font-weight: bold; }
        .btn-login-nav { background: rgba(255, 255, 255, 0.1); color: #fce4ec; padding: 8px 24px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; transition: 0.3s; }
        .btn-login-nav:hover { background: rgba(255, 255, 255, 0.2); border-color: #d4af37; color: #d4af37; }
        .btn-boss-mode { background: #d4af37; color: #1a0b2e; font-weight: bold; border: none; box-shadow: 0 0 10px rgba(212,175,55,0.5); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .login-card { background: rgba(30,15,45,0.85); border: 1px solid rgba(212,175,55,0.3); border-radius: 20px; padding: 40px; width: 85%; max-width: 360px; text-align: center; }
        .form-input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid rgba(212,175,55,0.3); border-radius: 8px; background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, #d4af37 0%, #b8901b 100%); color: #1a0b2e; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        header { text-align: center; padding: 180px 20px 100px; background: radial-gradient(circle at center, rgba(212,175,55,0.08) 0%, rgba(0,0,0,0) 60%); }
        h1 { color: #d4af37; font-size: 3.2em; margin-bottom: 20px; text-shadow: 0 0 15px rgba(212,175,55,0.5); }
        .subtitle { font-size: 1.2em; color: #e0d4f5; letter-spacing: 3px; margin-bottom: 40px; }
    </style>
</head>
<body>

    <nav class="nav-header">
        <div class="logo-text">朵藍姆光工作室</div>
        <button id="mainLoginBtn" class="btn-login-nav" onclick="handleMainBtnClick()">系統讀取中...</button>
    </nav>

    <header>
        <h1>在宇宙頻率中找回你的內在力量</h1>
        <div class="subtitle">天使訊息解讀 ｜ 個人能量調整 ｜ 靈性手作產品</div>
    </header>

    <div class="modal-overlay" id="loginModal">
        <div class="login-card">
            <h2 style="color: #d4af37;">系統登入</h2>
            <input type="text" id="accountInput" class="form-input" placeholder="請輸入帳號 (Email)">
            <input type="password" id="passwordInput" class="form-input" placeholder="請輸入密碼">
            <button class="btn-submit" onclick="loginWithAccount()">確認登入</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
