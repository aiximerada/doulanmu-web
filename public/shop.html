<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朵藍姆光商店 | 能量選物</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=PingFang+TC:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #d4af37; --deep-purple: #1a0b2e; --text-light: #c4b5d6; }
        body { margin: 0; font-family: 'PingFang TC', sans-serif; background: #0f051a; color: white; min-height: 100vh; }
        
        /* 導覽列優化 */
        .nav-header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(26, 11, 46, 0.9); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .logo { font-family: 'Noto Serif TC', serif; font-size: 1.4em; color: var(--gold); font-weight: bold; text-decoration: none; }
        
        .cart-trigger { background: var(--gold); color: var(--deep-purple); border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .cart-trigger:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }

        /* 商品卡片優化 */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .p-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; transition: 0.4s; position: relative; }
        .p-card:hover { border-color: var(--gold); transform: translateY(-10px); }
        .p-img { width: 100%; height: 250px; background-size: cover; background-position: center; transition: 0.5s; }
        .p-card:hover .p-img { transform: scale(1.1); }
        
        .p-content { padding: 20px; background: linear-gradient(to top, rgba(26,11,46,1), transparent); }
        .p-tag { font-size: 0.75em; color: var(--gold); border: 1px solid var(--gold); padding: 2px 8px; border-radius: 4px; }
        .p-title { margin: 10px 0; font-size: 1.25em; font-family: 'Noto Serif TC', serif; }
        .p-price { font-size: 1.4em; color: white; font-weight: bold; margin-bottom: 15px; }
        
        .btn-add { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--gold); color: var(--gold); border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { background: var(--gold); color: var(--deep-purple); }

        /* 右側滑出購物車清單 */
        .side-cart { position: fixed; right: -100%; top: 0; width: 400px; height: 100vh; background: #150826; z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; box-sizing: border-box; display: flex; flex-direction: column; border-left: 1px solid var(--gold); }
        .side-cart.active { right: 0; }
        .cart-item { display: flex; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .cart-item-img { width: 60px; height: 60px; border-radius: 8px; background-size: cover; }
        
        /* 數量選擇器 */
        .qty-box { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 5px; }
        .qty-btn { border: none; background: none; color: white; cursor: pointer; font-size: 1.2em; width: 30px; }
        
        /* 填單區 */
        .checkout-form { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--gold); }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.8em; color: var(--text-light); margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(212,175,55,0.3); background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; }
        
        .total-price { font-size: 1.5em; display: flex; justify-content: space-between; margin: 20px 0; }
        .btn-checkout { width: 100%; padding: 18px; background: var(--gold); color: var(--deep-purple); border: none; border-radius: 12px; font-weight: bold; font-size: 1.1em; cursor: pointer; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<nav class="nav-header">
    <a href="index.html" class="logo">朵藍姆光工作室</a>
    <button class="cart-trigger" onclick="toggleCart()">
        🛒 購物車 (<span id="cartCount">0</span>)
    </button>
</nav>

<div class="container">
    <h1 style="text-align: center; font-family: 'Noto Serif TC'; color: var(--gold);" id="catTitle">載入中...</h1>
    <div class="grid" id="productGrid"></div>
</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="side-cart" id="sideCart">
    <h2 style="color: var(--gold); margin-top: 0;">您的購物清單</h2>
    <div style="flex: 1; overflow-y: auto;" id="cartList">
        <p style="color: #888; text-align: center; margin-top: 50px;">購物車空空的喔 ✨</p>
    </div>

    <div class="checkout-form">
        <div class="total-price">總金額 <span id="totalDisplay">NT$ 0</span></div>
        <div class="input-group">
            <label>姓名</label>
            <input type="text" id="orderName" placeholder="請輸入收件人姓名">
        </div>
        <div class="input-group">
            <label>LINE ID</label>
            <input type="text" id="orderLine" placeholder="方便確認細節">
        </div>
        <div class="input-group">
            <label>收件地址 / 預約備註</label>
            <input type="text" id="orderAddress" placeholder="請輸入地址或備註">
        </div>
        <button class="btn-checkout" onclick="sendOrder()">立即結帳送出</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAwbENzVJ0-SWFv7DwU-I0IrIGTg1uOGKs",
        authDomain: "duolanmu.firebaseapp.com",
        projectId: "duolanmu",
        storageBucket: "duolanmu.firebasestorage.app",
        messagingSenderId: "11171522617",
        appId: "1:11171522617:web:5d4cad219e3f903fba05e8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const category = urlParams.get('category') || 'product';
    const catTitles = { 'angel': '👼 天使訊息解讀', 'energy': '✨ 個人能量調整', 'product': '🌿 靈性手作產品' };
    document.getElementById('catTitle').innerText = catTitles[category];

    let cart = [];

    // 1. 抓取商品
    db.collection("products").where("category", "==", category).onSnapshot(snapshot => {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        snapshot.forEach(doc => {
            const p = doc.data();
            const img = p.photoBase64 || 'https://via.placeholder.com/300x300?text=No+Image';
            grid.innerHTML += `
                <div class="p-card">
                    <div class="p-img" style="background-image: url(${img})"></div>
                    <div class="p-content">
                        <span class="p-tag">${p.tag || '能量選物'}</span>
                        <h3 class="p-title">${p.name}</h3>
                        <div class="p-price">NT$ ${p.price}</div>
                        <button class="btn-add" onclick="addToCart('${doc.id}', '${p.name}', ${p.price}, '${img}')">加入購物車</button>
                    </div>
                </div>
            `;
        });
    });

    // 2. 購物車邏輯
    function addToCart(id, name, price, img) {
        const index = cart.findIndex(item => item.id === id);
        if(index > -1) {
            cart[index].qty++;
        } else {
            cart.push({ id, name, price, img, qty: 1 });
        }
        renderCart();
        if(!document.getElementById('sideCart').classList.contains('active')) toggleCart();
    }

    function changeQty(index, delta) {
        cart[index].qty += delta;
        if(cart[index].qty <= 0) cart.splice(index, 1);
        renderCart();
    }

    function renderCart() {
        const list = document.getElementById('cartList');
        const count = document.getElementById('cartCount');
        const total = document.getElementById('totalDisplay');
        let totalSum = 0;
        let totalQty = 0;

        if(cart.length === 0) {
            list.innerHTML = `<p style="color: #888; text-align: center; margin-top: 50px;">購物車空空的喔 ✨</p>`;
        } else {
            list.innerHTML = cart.map((item, i) => {
                totalSum += item.price * item.qty;
                totalQty += item.qty;
                return `
                    <div class="cart-item">
                        <div class="cart-item-img" style="background-image: url(${item.img})"></div>
                        <div style="flex: 1;">
                            <div style="font-weight: bold;">${item.name}</div>
                            <div style="color: var(--gold); font-size: 0.9em;">NT$ ${item.price}</div>
                            <div class="qty-box" style="margin-top: 8px; width: fit-content;">
                                <button class="qty-btn" onclick="changeQty(${i}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        count.innerText = totalQty;
        total.innerText = `NT$ ${totalSum}`;
    }

    function toggleCart() {
        document.getElementById('sideCart').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    // 3. 送出訂單
    function sendOrder() {
        const name = document.getElementById('orderName').value;
        const line = document.getElementById('orderLine').value;
        const addr = document.getElementById('orderAddress').value;

        if(!name || !line || cart.length === 0) return alert("請填寫完整資訊並挑選商品喔！");

        const orderData = {
            customerName: name,
            contactInfo: `LINE: ${line} / 地址: ${addr}`,
            itemName: cart.map(i => `${i.name}x${i.qty}`).join(', '),
            price: cart.reduce((sum, i) => sum + (i.price * i.qty), 0),
            status: "待處理",
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        db.collection("orders").add(orderData).then(() => {
            alert("🎉 訂單已傳送到宇宙與店長的手中！我們會盡快與您聯繫。");
            cart = [];
            renderCart();
            toggleCart();
        });
    }
</script>
</body>
</html>
