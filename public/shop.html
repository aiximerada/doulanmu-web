<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>朵藍姆光商城</title>
    <meta name="description" content="朵藍姆光商城">
    
    <link rel="icon" href="大頭貼.png" type="image/png">
    <link rel="apple-touch-icon" href="大頭貼.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f051a">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=PingFang+TC:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        /* --- 全域質感設定 --- */
        :root { --gold: #d4af37; --bg-dark: #0f051a; --text-main: #fce4ec; --text-muted: #c4b5d6; }
        body { margin: 0; font-family: 'PingFang TC', sans-serif; background: transparent; color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Noto Serif TC', serif; letter-spacing: 1px; }

        /* --- ✨ 漂浮星空背景圖層 (與首頁同步) --- */
        #star-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: linear-gradient(135deg, #05020a 0%, #150826 50%, #080312 100%); overflow: hidden; }
        .star { position: absolute; background-color: #fff; border-radius: 50%; opacity: 0; animation: twinkle infinite ease-in-out, drift infinite linear; box-shadow: 0 0 4px #fff; }
        @keyframes twinkle { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.9; box-shadow: 0 0 10px rgba(212,175,55,0.8); } }
        @keyframes drift { from { transform: translateY(10vh); } to { transform: translateY(-110vh); } }

        /* --- 頂部導覽列 --- */
        .nav-header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(10, 4, 18, 0.85); backdrop-filter: blur(15px); position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 1000; border-bottom: 1px solid rgba(212,175,55,0.15); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .logo-text { font-family: 'Noto Serif TC', serif; font-size: 1.5em; color: var(--gold); font-weight: bold; text-decoration: none; text-shadow: 0 2px 5px rgba(0,0,0,0.5); letter-spacing: 1px; }
        .nav-actions { display: flex; gap: 15px; align-items: center; }
        .btn-back { color: var(--text-main); text-decoration: none; border: 1px solid rgba(255,255,255,0.3); padding: 8px 20px; border-radius: 30px; transition: 0.3s; font-size: 0.9em; background: rgba(255,255,255,0.05); backdrop-filter: blur(5px); }
        .btn-back:hover { color: var(--gold); border-color: var(--gold); background: rgba(212,175,55,0.1); }
        
        /* 購物車按鈕 */
        .btn-cart { background: linear-gradient(135deg, #d4af37 0%, #b8901b 100%); color: var(--bg-dark); border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(212,175,55,0.3); }
        .btn-cart:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(212,175,55,0.5); }
        .cart-badge { background: #e74c3c; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.85em; }

        /* --- 🌟 電商佈局：側邊欄 + 主內容 (加寬排版) --- */
        .shop-layout { display: flex; gap: 40px; max-width: 1400px; margin: 100px auto 60px; padding: 0 5%; align-items: flex-start; }
        
        /* 左側分類選單 (毛玻璃質感) */
        .sidebar-menu { width: 260px; flex-shrink: 0; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 25px 20px; position: sticky; top: 100px; backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .sidebar-menu h3 { color: var(--text-muted); font-size: 1.1em; margin-top: 0; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); letter-spacing: 1px; }
        .cat-list { list-style: none; padding: 0; margin: 0; }
        .cat-list li { padding: 14px 18px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; color: white; transition: 0.3s; font-size: 1.05em; display: flex; align-items: center; gap: 12px; border: 1px solid transparent; }
        .cat-list li:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
        .cat-list li.active { background: rgba(212,175,55,0.15); color: var(--gold); font-weight: bold; border-color: rgba(212,175,55,0.3); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* 右側商品列表區 */
        .main-content { flex-grow: 1; min-width: 0; }
        .category-title { color: var(--gold); font-size: 2.2em; margin-top: 0; margin-bottom: 30px; text-shadow: 0 0 15px rgba(212,175,55,0.3); display: flex; align-items: center; gap: 12px; }
        
        /* 商品卡片網格 (毛玻璃質感) */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        .product-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; overflow: hidden; transition: 0.4s; display: flex; flex-direction: column; backdrop-filter: blur(10px); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .product-card:hover { transform: translateY(-8px); border-color: rgba(212,175,55,0.6); box-shadow: 0 15px 35px rgba(0,0,0,0.5); background: rgba(255,255,255,0.05); }
        .product-img { width: 100%; height: 220px; background-size: cover; background-position: center; background-color: rgba(0,0,0,0.5); position: relative; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tag-badge { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.75); color: var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 0.8em; border: 1px solid rgba(212,175,55,0.5); backdrop-filter: blur(5px); font-weight: bold; }
        
        .product-info { padding: 25px 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .product-info h4 { margin: 0 0 10px 0; font-size: 1.15em; color: white; line-height: 1.4; letter-spacing: 1px; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; margin-top: auto; }
        .product-price { color: var(--gold); font-weight: bold; font-size: 1.4em; }
        .product-weight { color: #888; font-size: 0.9em; }
        
        .btn-add-cart { width: 100%; background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 1.05em; }
        .product-card:hover .btn-add-cart { background: var(--gold); color: var(--bg-dark); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }

        /* 售罄/空分類的絕美提示區塊 */
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 20px; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px dashed rgba(212,175,55,0.4); backdrop-filter: blur(10px); }
        .empty-state .icon { font-size: 4em; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.3)); }
        .empty-state h3 { color: var(--gold); font-size: 1.5em; margin-bottom: 15px; }
        .empty-state p { color: #aaa; line-height: 1.6; font-size: 1.05em; }

        /* --- 🛒 側邊滑出購物車 --- */
        .cart-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 2000; }
        .cart-overlay.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .cart-panel { position: fixed; top: 0; right: -450px; width: 100%; max-width: 420px; height: 100vh; background: rgba(15, 5, 26, 0.95); backdrop-filter: blur(25px); border-left: 1px solid rgba(212,175,55,0.3); box-shadow: -10px 0 40px rgba(0,0,0,0.7); z-index: 2001; transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; flex-direction: column; }
        .cart-panel.active { right: 0; }
        
        .cart-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .cart-header h2 { margin: 0; color: var(--gold); font-family: 'Noto Serif TC', serif; font-size: 1.4em; }
        .close-cart { font-size: 2em; color: #888; cursor: pointer; line-height: 1; transition: 0.3s; }
        .close-cart:hover { color: var(--gold); transform: rotate(90deg); }
        
        .cart-items-container { flex: 1; overflow-y: auto; padding: 25px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .item-info h4 { margin: 0 0 8px 0; color: white; font-size: 1.05em; line-height: 1.3; }
        .item-info .item-price { color: var(--gold); font-weight: bold; }
        
        .qty-controls { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.4); border-radius: 20px; padding: 5px 10px; border: 1px solid rgba(255,255,255,0.1); }
        .qty-btn { background: transparent; color: white; border: none; font-size: 1.2em; cursor: pointer; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .qty-btn:hover { background: rgba(212,175,55,0.2); color: var(--gold); }
        
        .checkout-section { padding: 25px; background: rgba(0,0,0,0.6); border-top: 1px solid rgba(212,175,55,0.3); }
        .cart-total { display: flex; justify-content: space-between; font-size: 1.4em; font-weight: bold; color: white; margin-bottom: 25px; }
        .cart-total span { color: var(--gold); }
        
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 14px; border: 1px solid rgba(212,175,55,0.3); border-radius: 10px; background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; transition: 0.3s; font-size: 1em; }
        .form-group input:focus { outline: none; border-color: var(--gold); background: rgba(0,0,0,0.6); box-shadow: 0 0 10px rgba(212,175,55,0.2); }
        .btn-confirm { width: 100%; background: linear-gradient(135deg, #d4af37 0%, #b8901b 100%); color: var(--bg-dark); border: none; padding: 16px; border-radius: 10px; font-weight: bold; font-size: 1.15em; cursor: pointer; margin-top: 10px; transition: 0.3s; letter-spacing: 1px; }
        .btn-confirm:hover { box-shadow: 0 5px 20px rgba(212,175,55,0.5); transform: translateY(-2px); }

        /* --- 手機版響應式設計 (完美兼容) --- */
        @media (max-width: 768px) {
            .shop-layout { flex-direction: column; gap: 20px; margin-top: 80px; padding: 0 15px; }
            /* 手機版：側邊欄變成頂部滑動導覽 */
            .sidebar-menu { width: 100%; position: static; padding: 15px; box-sizing: border-box; border-radius: 15px; }
            .sidebar-menu h3 { display: none; }
            .cat-list { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 5px; white-space: nowrap; -webkit-overflow-scrolling: touch; }
            .cat-list::-webkit-scrollbar { display: none; }
            .cat-list li { margin: 0; padding: 10px 18px; font-size: 0.95em; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
            .cat-list li.active { border: 1px solid var(--gold); background: rgba(212,175,55,0.15); box-shadow: none; }
            .nav-header { padding: 12px 15px; }
            .logo-text { font-size: 1.3em; }
            .btn-back span { display: none; }
            .category-title { font-size: 1.6em; }
        }
    </style>
</head>
<body>

    <div id="star-bg"></div>

    <nav class="nav-header">
        <a href="index.html" class="logo-text">朵藍姆光商城</a>
        <div class="nav-actions">
            <a href="index.html" class="btn-back"><span>返回首頁</span> 🏠</a>
            <button class="btn-cart" onclick="toggleCart()">
                🛒 <span id="cartCountBadge" class="cart-badge">0</span>
            </button>
        </div>
    </nav>

    <div class="shop-layout">
        <aside class="sidebar-menu">
            <h3>商品分類</h3>
            <ul class="cat-list" id="categoryMenu">
                <li data-cat="all" class="active">🌟 全部商品</li>
                <li data-cat="product">🌿 靈性手作產品</li>
                <li data-cat="energy">✨ 個人能量調整</li>
                <li data-cat="angel">👼 天使訊息解讀</li>
            </ul>
        </aside>

        <main class="main-content">
            <h2 class="category-title" id="categoryTitle">🌟 全部商品</h2>
            <div class="products-grid" id="productsArea">
                <div style="grid-column: 1 / -1; text-align: center; padding: 60px 0; color: #888; font-size: 1.2em;">正在從宇宙頻率中下載商品資訊... ✨</div>
            </div>
        </main>
    </div>

    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
    <div class="cart-panel" id="cartPanel">
        <div class="cart-header">
            <h2>購物車內容</h2>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        
        <div class="cart-items-container" id="cartItemsArea">
            <div style="text-align:center; color:#888; margin-top:50px; font-size: 1.1em;">購物車目前是空的喔！快去逛逛吧 ✨</div>
        </div>

        <div class="checkout-section">
            <div class="cart-total">總計金額 <span>NT$ <span id="cartTotalPrice">0</span></span></div>
            <div class="form-group"><input type="text" id="cName" placeholder="👤 姓名 (必填)"></div>
            <div class="form-group"><input type="text" id="cLine" placeholder="📱 LINE ID (必填，方便聯繫)"></div>
            <div class="form-group"><input type="text" id="cAddress" placeholder="🏠 寄送地址 (預約服務免填)"></div>
            <button class="btn-confirm" onclick="submitOrder()" id="submitBtn">確認送出訂單</button>
        </div>
    </div>

    <script>
        // --- ✨ 生成漂浮星空 (與首頁同步) ---
        function initStars() {
            const bg = document.getElementById('star-bg');
            const starCount = 120;
            for(let i=0; i<starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 2.5 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's, ' + (Math.random() * 50 + 30) + 's';
                star.style.animationDelay = (Math.random() * 5) + 's, ' + (Math.random() * -50) + 's';
                bg.appendChild(star);
            }
        }
        initStars();

        // --- Firebase 初始化 ---
        const firebaseConfig = {
            apiKey: "AIzaSyAwbENzVJ0-SWFv7DwU-I0IrIGTg1uOGKs",
            authDomain: "duolanmu.firebaseapp.com",
            projectId: "duolanmu",
            storageBucket: "duolanmu.firebasestorage.app",
            messagingSenderId: "11171522617",
            appId: "1:11171522617:web:5d4cad219e3f903fba05e8"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        const catTitles = { 
            'all': '🌟 全部商品', 
            'product': '🌿 靈性手作產品', 
            'energy': '✨ 個人能量調整', 
            'angel': '👼 天使訊息解讀' 
        };

        // --- 🌟 商品讀取邏輯 (包含售罄提示) ---
        function loadProducts(category) {
            const area = document.getElementById("productsArea");
            const title = document.getElementById("categoryTitle");
            area.innerHTML = `<div style="grid-column: 1 / -1; text-align: center; padding: 60px 0; color: #888; font-size: 1.2em;">讀取中... ✨</div>`;
            title.innerText = catTitles[category] || '🌟 全部商品';

            document.querySelectorAll('.cat-list li').forEach(li => {
                li.classList.toggle('active', li.dataset.cat === category);
            });

            let query = db.collection("products").orderBy("createdAt", "desc");
            if (category !== 'all') { query = query.where("category", "==", category); }

            query.get().then((querySnapshot) => {
                area.innerHTML = ""; 
                
                // 🔥 如果沒有商品，顯示精緻的售罄/準備中畫面
                if(querySnapshot.empty) {
                    area.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">✨</div>
                            <h3>目前該種類皆已全部售罄或準備中</h3>
                            <p>店長正在為您努力準備更多宇宙高頻好物<br>請稍後再來逛逛喔！</p>
                        </div>
                    `;
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const bgImage = data.photoBase64 ? `url(${data.photoBase64})` : 'none';
                    const weightText = data.weight ? `${data.weight}g` : '';
                    const tagText = data.tag ? `<div class="tag-badge">${data.tag}</div>` : '';

                    area.innerHTML += `
                        <div class="product-card">
                            <div class="product-img" style="background-image: ${bgImage};">${tagText}</div>
                            <div class="product-info">
                                <h4>${data.name}</h4>
                                <div class="price-row">
                                    <span class="product-price">NT$ ${data.price}</span>
                                    <span class="product-weight">${weightText}</span>
                                </div>
                                <button class="btn-add-cart" onclick="addToCart('${doc.id}', '${data.name}', ${data.price})">🛒 加入購物車</button>
                            </div>
                        </div>
                    `;
                });
            }).catch(error => { 
                area.innerHTML = `<div style="grid-column: 1 / -1; text-align: center; padding: 60px 0; color: #e74c3c; font-size: 1.2em;">讀取失敗，請重新整理網頁。</div>`;
            });
        }

        // 綁定左側選單點擊事件
        document.querySelectorAll('.cat-list li').forEach(li => {
            li.addEventListener('click', () => {
                const targetCat = li.dataset.cat;
                loadProducts(targetCat);
                window.history.pushState({}, '', `shop.html${targetCat === 'all' ? '' : '?category=' + targetCat}`);
            });
        });

        const urlParams = new URLSearchParams(window.location.search);
        const initialCategory = urlParams.get('category') || 'all';
        loadProducts(initialCategory);

        // --- 🛒 購物車邏輯 ---
        let cart = [];

        function addToCart(id, name, price) {
            const existingItem = cart.find(item => item.id === id);
            if (existingItem) { existingItem.qty += 1; } 
            else { cart.push({ id: id, name: name, price: price, qty: 1 }); }
            updateCartUI();
            
            const badge = document.getElementById('cartCountBadge');
            badge.style.transform = "scale(1.5)";
            setTimeout(() => { badge.style.transform = "scale(1)"; }, 200);
        }

        function updateQty(index, change) {
            cart[index].qty += change;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const area = document.getElementById('cartItemsArea');
            const badge = document.getElementById('cartCountBadge');
            const totalEl = document.getElementById('cartTotalPrice');
            let totalItems = 0, totalPrice = 0;

            if (cart.length === 0) {
                area.innerHTML = `<div style="text-align:center; color:#888; margin-top:50px; font-size: 1.1em;">購物車目前是空的喔！快去逛逛吧 ✨</div>`;
            } else {
                area.innerHTML = "";
                cart.forEach((item, index) => {
                    totalItems += item.qty; totalPrice += (item.price * item.qty);
                    area.innerHTML += `
                        <div class="cart-item">
                            <div class="item-info">
                                <h4>${item.name}</h4>
                                <div class="item-price">NT$ ${item.price}</div>
                            </div>
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                                <span style="font-weight:bold;">${item.qty}</span>
                                <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                            </div>
                        </div>
                    `;
                });
            }
            badge.innerText = totalItems; totalEl.innerText = totalPrice;
        }

        function toggleCart() {
            document.getElementById('cartOverlay').classList.toggle('active');
            document.getElementById('cartPanel').classList.toggle('active');
        }

        function submitOrder() {
            if (cart.length === 0) return alert("購物車是空的，無法結帳喔！");
            const name = document.getElementById('cName').value.trim();
            const line = document.getElementById('cLine').value.trim();
            const address = document.getElementById('cAddress').value.trim();
            if (!name || !line) return alert("請填寫您的「姓名」與「LINE ID」，以便店長與您聯繫確認喔！");

            const btn = document.getElementById('submitBtn');
            btn.innerText = "訂單傳送中..."; btn.disabled = true;

            const itemNamesString = cart.map(item => `${item.name} x${item.qty}`).join(' , ');
            let contactString = `LINE: ${line}`;
            if (address) contactString += ` | 地址: ${address}`;
            const finalTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            db.collection("orders").add({
                customerName: name, contactInfo: contactString, itemName: itemNamesString,
                price: finalTotal, status: "待處理", createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert("🎉 訂單傳送成功！店長將會盡快與您聯繫！");
                cart = []; updateCartUI();
                document.getElementById('cName').value = ""; document.getElementById('cLine').value = ""; document.getElementById('cAddress').value = "";
                toggleCart();
                btn.innerText = "確認送出訂單"; btn.disabled = false;
            }).catch(error => {
                alert("訂單送出失敗，請檢查網路連線。");
                btn.innerText = "確認送出訂單"; btn.disabled = false;
            });
        }
    </script>
</body>
</html>
