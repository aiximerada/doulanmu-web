<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朵藍姆光工作室 | 系統管理後台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=PingFang+TC:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { margin: 0; font-family: 'PingFang TC', sans-serif; background: #f4f7f6; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: #1a0b2e; color: #fce4ec; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.1); z-index: 10; }
        .sidebar-brand { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .sidebar-brand h2 { font-family: 'Noto Serif TC', serif; color: #d4af37; margin: 0; font-size: 1.5em; letter-spacing: 2px; }
        .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 5px; padding: 0 15px; }
        .nav-item { padding: 15px 20px; border-radius: 10px; color: #c4b5d6; cursor: pointer; transition: 0.3s; font-size: 1.05em; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.15); color: #d4af37; font-weight: bold; }
        .logout-btn { margin: 15px; padding: 15px; background: rgba(192, 57, 43, 0.8); color: white; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .logout-btn:hover { background: #e74c3c; }
        .main-content { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .top-header h2 { margin: 0; color: #1a0b2e; font-size: 1.8em; }
        .admin-badge { background: #d4af37; color: #1a0b2e; padding: 8px 20px; border-radius: 30px; font-weight: bold; box-shadow: 0 4px 10px rgba(212,175,55,0.3); }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .panel { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #f4f7f6; padding-bottom: 15px; }
        .btn-add { background: #1a0b2e; color: #d4af37; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add:hover { background: #d4af37; color: #1a0b2e; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; vertical-align: middle; }
        th { color: #888; font-weight: normal; font-size: 0.9em; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.85em; font-weight: bold; background: #e8f8f5; color: #1abc9c; border: 1px solid #1abc9c; }
        .btn-action { background: #f4f7f6; border: 1px solid #ddd; padding: 6px 12px; border-radius: 5px; cursor: pointer; color: #555; transition: 0.2s; margin-right: 5px;}
        .btn-action:hover { background: #d4af37; color: white; border-color: #d4af37; }
        
        /* 彈出表單設計 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; font-size: 0.9em; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        #imagePreview { display: none; width: 100px; height: 100px; object-fit: cover; border-radius: 8px; margin-top: 10px; border: 2px dashed #ccc; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand"><h2>朵藍姆光工作室</h2><p>系統管理後台</p></div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="switchSection('dashboard', this)">📊 系統儀表板</div>
            <div class="nav-item" onclick="switchSection('products', this)">🌿 商品與課程管理</div>
            <div class="nav-item" onclick="switchSection('orders', this)">📦 訂單管理</div>
            <div class="nav-item" onclick="switchSection('members', this)">👥 會員權限管理</div>
        </div>
        <div class="logout-btn" onclick="logout()">登出系統 ➔</div>
    </div>

    <div class="main-content">
        <div class="top-header">
            <h2 id="pageTitle">系統儀表板</h2>
            <div class="admin-badge">⭐ 系統管理員</div>
        </div>

        <div id="dashboard" class="section active">
            <div class="panel">
                <h3>歡迎來到朵藍姆光工作室後台</h3>
                <p>資料庫即時連線已啟動！</p>
            </div>
        </div>

        <div id="products" class="section">
            <div class="panel">
                <div class="panel-header">
                    <h3>上架商品/課程列表</h3>
                    <button class="btn-add" onclick="openProductModal()">＋ 新增上架</button>
                </div>
                <table>
                    <thead><tr><th>照片</th><th>名稱</th><th>標籤</th><th>價格</th><th>操作</th></tr></thead>
                    <tbody id="productsTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="orders" class="section">
            <div class="panel">
                <div class="panel-header"><h3>客戶訂單與預約紀錄</h3></div>
                <table>
                    <thead><tr><th>客戶姓名</th><th>購買項目</th><th>總金額</th><th>聯絡方式</th><th>下單時間</th></tr></thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="members" class="section">
            <div class="panel">
                <div class="panel-header">
                    <h3>註冊會員列表</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>會員帳號 (Email)</th>
                            <th>權限身分</th>
                            <th>最後登入時間</th>
                            <th>權限操作</th>
                        </tr>
                    </thead>
                    <tbody id="membersTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#1a0b2e; border-bottom: 2px solid #d4af37; padding-bottom: 10px;">📦 新增商品資訊</h3>
            <div class="form-group"><label>📷 商品照片</label><input type="file" id="pPhoto" accept="image/*" onchange="compressImage(event)"><img id="imagePreview"></div>
            <div class="form-group"><label>🏷️ 名稱</label><input type="text" id="pName"></div>
            <div class="form-group"><label>🔖 標籤</label><select id="pTagSelect"><option value="手工皂">手工皂</option><option value="擴香石">擴香石</option></select></div>
            <div class="form-group"><label>💰 價格</label><input type="number" id="pPrice"></div>
            <div class="form-group"><label>📝 簡介</label><textarea id="pIntro" rows="3"></textarea></div>
            <div class="modal-btns">
                <button class="btn-action" onclick="closeProductModal()">取消</button>
                <button class="btn-add" onclick="saveProduct()">確認上架</button>
            </div>
        </div>
    </div>

    <script>

            authDomain: "duolanmu.firebaseapp.com",
