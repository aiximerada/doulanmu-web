<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朵藍姆光工作室 | 專屬管理後台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=PingFang+TC:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        body { margin: 0; font-family: 'PingFang TC', sans-serif; background: #f4f6f9; color: #333; }
        .admin-header { background: #1a0b2e; color: #d4af37; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; }
        .admin-title { font-family: 'Noto Serif TC', serif; font-size: 1.5em; font-weight: bold; }
        .btn-logout { background: transparent; color: #fce4ec; border: 1px solid #fce4ec; padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn-logout:hover { background: #fce4ec; color: #1a0b2e; }
        
        .dashboard { padding: 40px 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .admin-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; border-top: 4px solid #d4af37; transition: 0.3s; cursor: pointer; }
        .admin-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .admin-card h3 { color: #1a0b2e; margin-bottom: 10px; }
        .admin-card p { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="admin-header">
        <div class="admin-title">朵藍姆光工作室｜管理員後台</div>
        <button class="btn-logout" onclick="logout()">登出系統</button>
    </div>

    <div class="dashboard">
        <div class="admin-card">
            <h3>🌿 手作產品管理</h3>
            <p>上架或修改能量皂、精油滾珠瓶等商品資訊與庫存</p>
        </div>
        <div class="admin-card">
            <h3>📅 靈性課程與個案</h3>
            <p>管理光語圖騰療法、曼陀羅彩繪的開課時間與名單</p>
        </div>
        <div class="admin-card">
            <h3>👥 會員與訂單</h3>
            <p>查看目前註冊的學員名單與產品預購狀況</p>
        </div>
    </div>

    <script>
        // 🌟 你的 Firebase 真實金鑰 🌟
        const firebaseConfig = {
            apiKey: "AIzaSyAwbENzVJ0-SWFv7DwU-I0IrIGTg1uOGKs",
            authDomain: "duolanmu.firebaseapp.com",
            projectId: "duolanmu",
            storageBucket: "duolanmu.firebasestorage.app",
            messagingSenderId: "11171522617",
            appId: "1:11171522617:web:5d4cad219e3f903fba05e8",
            measurementId: "G-5BJGQYRF3E"
        };
        
        // 確保 Firebase 只初始化一次
        if (!firebase.apps.length) { 
            firebase.initializeApp(firebaseConfig); 
        }

        // 🌟 安全守門員：認 UID 不認人！
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                // 如果沒登入，踢回首頁
                alert("請先登入！");
                window.location.href = "index.html";
            } else {
                // 如果登入的 UID 不是老闆的 UID，立刻踢出！
                const adminUID = "zaq6RAandkQmPGFKwBdeZEWoArC2"; 
                if (user.uid !== adminUID) {
                    alert("您沒有管理員權限喔！");
                    window.location.href = "index.html";
                }
            }
        });

        // 登出功能
        function logout() {
            firebase.auth().signOut().then(() => {
                window.location.href = "index.html";
            });
        }
    </script>
</body>
</html>
