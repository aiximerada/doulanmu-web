<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朵藍姆光工作室 | 專屬管理後台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=PingFang+TC:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        body { margin: 0; font-family: 'PingFang TC', sans-serif; background: #f4f6f9; display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: #1a0b2e; color: #fce4ec; padding-top: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .sidebar-brand { font-family: 'Noto Serif TC', serif; font-size: 1.4em; font-weight: bold; color: #d4af37; text-align: center; margin-bottom: 30px; padding: 0 20px; }
        .nav-item { padding: 15px 25px; color: #c4b5d6; text-decoration: none; display: block; transition: 0.3s; font-size: 1.05em; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; border-left: 4px solid #d4af37; }
        .spacer { flex-grow: 1; }
        .logout-btn { padding: 15px 25px; background: #c0392b; color: white; border: none; width: 100%; text-align: left; font-size: 1.05em; cursor: pointer; transition: 0.3s; }
        .logout-btn:hover { background: #e74c3c; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .top-header h2 { margin: 0; color: #333; }
        .admin-badge { background: #d4af37; color: #1a0b2e; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9em; }
        .dashboard-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 5px solid #d4af37; }
        .stat-card h4 { margin: 0 0 10px 0; color: #888; font-weight: normal; }
        .stat-card .number { font-size: 2em; font-weight: bold; color: #1a0b2e; margin: 0; }
        .content-panel { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .content-panel h3 { margin-top: 0; color: #333; border-bottom: 2px solid #f4f6f9; padding-bottom: 10px; }
        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; height: auto; } .main-content { padding: 20px; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">朵藍姆光工作室<br><span style="font-size: 0.6em; color: #888;">管理員後台系統</span></div>
        <a class="nav-item active">📊 系統儀表板</a>
        <a class="nav-item">🌿 手作商品管理</a>
        <a class="nav-item">📅 課程預約名單</a>
        <a class="nav-item">👥 會員與訂單</a>
        <a class="nav-item">⚙️ LINE 串接設定</a>
        <div class="spacer"></div>
        <button class="logout-btn" onclick="logout()">登出系統 ➔</button>
    </div>

    <div class="main-content">
        <div class="top-header">
            <h2>系統儀表板</h2>
            <div class="admin-badge">⭐ 系統管理員</div>
        </div>

        <div class="dashboard-cards">
            <div class="stat-card"><h4>本月新增會員</h4><p class="number">12</p></div>
            <div class="stat-card"><h4>待處理訂單</h4><p class="number" style="color: #e67e22;">3</p></div>
            <div class="stat-card"><h4>近期預約個案</h4><p class="number">5</p></div>
        </div>

        <div class="content-panel">
            <h3>近期系統動態</h3>
            <p style="color: #666; line-height: 1.8;">
                ✅ 系統升級成功：已啟用「記住設備」與「自動感應登入」功能。<br>
                ✅ 安全防護已啟動：目前僅有系統管理員可進入此頁面。<br>
                ⏳ 待辦事項：準備串接 LINE 快速登入 API。
            </p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAwbENzVJ0-SWFv7DwU-I0IrIGTg1uOGKs",
            authDomain: "duolanmu.firebaseapp.com",
            projectId: "duolanmu",
            storageBucket: "duolanmu.firebasestorage.app",
            messagingSenderId: "11171522617",
            appId: "1:11171522617:web:5d4cad219e3f903fba05e8",
            measurementId: "G-5BJGQYRF3E"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }

        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                const adminUID = "zaq6RAandkQmPGFKwBdeZEWoArC2"; 
                if (user.uid !== adminUID) {
                    alert("您沒有管理員權限喔！已將您踢回首頁。");
                    window.location.href = "index.html";
                }
            }
        });

        function logout() {
            firebase.auth().signOut().then(() => {
                window.location.href = "index.html";
            });
        }
    </script>
</body>
</html>
